<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f1b2d"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="15%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="85%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <circle cx="980" cy="70" r="220" fill="url(#glow)"/>
  <circle cx="120" cy="230" r="160" fill="url(#glow)"/>

  <!-- grid dots -->
  <g fill="#1e2c42">
    <circle cx="40" cy="40" r="2"/><circle cx="70" cy="40" r="2"/><circle cx="100" cy="40" r="2"/>
    <circle cx="40" cy="70" r="2"/><circle cx="70" cy="70" r="2"/><circle cx="100" cy="70" r="2"/>
    <circle cx="1100" cy="220" r="2"/><circle cx="1130" cy="220" r="2"/><circle cx="1160" cy="220" r="2"/>
    <circle cx="1100" cy="250" r="2"/><circle cx="1130" cy="250" r="2"/><circle cx="1160" cy="250" r="2"/>
  </g>

  <!-- monitor pulse line -->
  <path d="M850,190 L900,190 L920,150 L940,225 L960,110 L980,205 L1000,190 L1160,190"
        fill="none" stroke="url(#pulse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="960" cy="110" r="5" fill="#22d3ee"/>

  <!-- bar chart accent (bottom left) -->
  <g fill="#f59e0b" opacity="0.85">
    <rect x="60" y="225" width="10" height="20"/>
    <rect x="76" y="210" width="10" height="35"/>
    <rect x="92" y="195" width="10" height="50"/>
    <rect x="108" y="218" width="10" height="27"/>
  </g>

  <!-- bell / alert accent (bottom right) -->
  <g stroke="#f59e0b" stroke-width="3" fill="none" opacity="0.85">
    <path d="M1115,235 a18,18 0 0 1 36,0 v10 a8,8 0 0 0 6,8 h-48 a8,8 0 0 0 6,-8 z"/>
    <line x1="1133" y1="255" x2="1133" y2="260"/>
  </g>

  <!-- text -->
  <text x="60" y="120" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#f8fafc" letter-spacing="1">
    MONITORING STACK AUTOMATION
  </text>
  <text x="60" y="158" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#94a3b8">
    Infrastructure as Code &#183; Prometheus &#183; Grafana &#183; Loki &#183; Alertmanager &#183; Ansible
  </text>

  <text x="60" y="200" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#22d3ee" font-weight="600">
    DEVRISTON
  </text>
  <text x="155" y="200" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#475569">
    devriston.com.pk
  </text>
</svg>
